<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Bigasan POS</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #111827;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    h1 { margin: 0 0 10px; font-size: 1.3rem; }
    p { margin: 8px 0; color: #374151; }
    .hint { font-size: 0.9rem; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're Offline</h1>
    <p>Bigasan POS can work without internet after the app is opened at least once online.</p>
    <p class="hint">Reconnect once to refresh files, then you can continue offline.</p>
  </div>
</body>
</html>
